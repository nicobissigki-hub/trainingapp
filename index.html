<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1014">
<title>Trainingslog · Nico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1014; --surface:#161b22; --surface-2:#1d242d; --input:#11161c;
    --line:#2a323d; --line-soft:#212932;
    --text:#e8edf2; --dim:#8b97a6; --faint:#5b6674;
    --warm:#ff7a29; --warm-soft:rgba(255,122,41,.13); --warm-line:rgba(255,122,41,.35);
    --cool:#33c4b2; --cool-soft:rgba(51,196,178,.12); --cool-line:rgba(51,196,178,.35);
    --good:#5ad17f; --good-soft:rgba(90,209,127,.14);
    --danger:#ff5470;
    --r:14px; --rs:10px;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--body);
    font-size:15px; line-height:1.5; padding-bottom:40px;
    background-image:radial-gradient(1200px 400px at 80% -10%, rgba(255,122,41,.06), transparent 60%),
                     radial-gradient(1000px 400px at -10% 10%, rgba(51,196,178,.05), transparent 55%);
  }
  h1,h2,h3{font-family:var(--disp);margin:0;font-weight:700;letter-spacing:-.01em}
  .num{font-family:var(--disp);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
  input,textarea{font-family:var(--disp);font-variant-numeric:tabular-nums}

  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
    padding:14px 18px;background:linear-gradient(180deg,rgba(13,16,20,.96),rgba(13,16,20,.82));
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line-soft);
    padding-top:max(14px,env(safe-area-inset-top))}
  .back{width:34px;height:34px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);
    display:none;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;transition:.15s}
  .back:active{transform:scale(.94)}
  .brand{display:flex;flex-direction:column;line-height:1.15}
  .brand .t{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.02em}
  .brand .s{font-size:11px;color:var(--dim);letter-spacing:.04em;text-transform:uppercase}
  .brand .accent{color:var(--warm)}

  .wrap{max-width:640px;margin:0 auto;padding:18px}

  .phasebar{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:5px}
  .pbtn{flex:1;padding:11px 6px;border-radius:8px;font-family:var(--disp);font-weight:500;font-size:14px;color:var(--dim);transition:.15s}
  .pbtn.on{background:var(--surface-2);color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}
  .phasesub{font-size:12px;color:var(--faint);font-family:var(--disp);letter-spacing:.03em;margin:11px 4px 2px}

  .lede{color:var(--dim);font-size:13px;margin:8px 2px 6px;line-height:1.55}
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:520px){.grid{grid-template-columns:1fr 1fr}}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:16px 16px 15px;overflow:hidden;transition:.15s;text-align:left;width:100%}
  .card:active{transform:scale(.985)}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--warm))}
  .card.cool{--accent:var(--cool)}
  .card .tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--disp);font-size:10.5px;font-weight:500;
    letter-spacing:.06em;text-transform:uppercase;color:var(--accent,var(--warm));
    background:var(--accent-soft,var(--warm-soft));border:1px solid var(--accent-line,var(--warm-line));
    padding:3px 8px;border-radius:6px;margin-bottom:11px}
  .card.cool .tag{--accent-soft:var(--cool-soft);--accent-line:var(--cool-line)}
  .card h3{font-size:19px;margin-bottom:3px}
  .card .desc{font-size:12.5px;color:var(--dim);line-height:1.45}
  .card .chev{position:absolute;right:14px;top:16px;color:var(--faint);font-size:15px}

  .section-label{font-family:var(--disp);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--faint);margin:24px 4px 12px}

  .view{display:none}
  .view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .s-head h2{font-size:24px}
  .s-sub{color:var(--dim);font-size:13px;margin-top:3px}
  .s-target{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 4px}
  .pill{font-family:var(--disp);font-size:12px;background:var(--surface-2);border:1px solid var(--line);
    color:var(--dim);padding:5px 10px;border-radius:8px}
  .pill b{color:var(--text);font-weight:500}

  .tabs{display:flex;gap:4px;margin:16px 0 4px;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:4px}
  .tab{flex:1;padding:8px;border-radius:8px;font-family:var(--disp);font-size:13px;color:var(--dim);text-align:center;transition:.15s}
  .tab.on{background:var(--surface-2);color:var(--text)}

  .ex{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 15px 6px;margin:12px 0}
  .ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:3px}
  .ex-name{font-family:var(--disp);font-weight:500;font-size:16px;line-height:1.25}
  .ex-hint-inline{color:var(--warm);font-size:11.5px;font-weight:500;flex:0 0 auto;text-align:right}
  .ex-meta{display:flex;flex-wrap:wrap;gap:6px 10px;font-size:12px;color:var(--dim);margin:6px 0 4px}
  .ex-meta .m b{color:var(--text);font-family:var(--disp);font-weight:500}
  .last{font-size:11.5px;color:var(--faint);margin:2px 0 10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .last .lbl{color:var(--faint)}

  .barinfo{display:flex;align-items:center;gap:8px;margin:0 0 8px;font-size:12px;color:var(--dim)}
  .barinfo input{width:64px}

  .setrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--line-soft)}
  .setno{font-family:var(--disp);font-size:12px;color:var(--faint);width:30px;flex:0 0 auto}
  .fields{display:flex;gap:7px;flex:1;flex-wrap:wrap}
  .field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
  .field label{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-family:var(--disp);padding-left:2px}
  input.in{background:var(--input);border:1px solid var(--line);border-radius:9px;color:var(--text);
    padding:10px 9px;font-size:15px;width:100%;text-align:center;transition:.15s;min-width:0}
  input.in:focus{outline:none;border-color:var(--warm);background:#141b22}
  input.in.rpe:focus{border-color:var(--cool)}
  .total{font-family:var(--disp);font-size:13px;color:var(--warm);width:52px;text-align:right;flex:0 0 auto;font-variant-numeric:tabular-nums}

  .checkrow{display:flex;align-items:center;gap:12px;padding:12px 2px;border-top:1px solid var(--line-soft)}
  .checkrow:first-of-type{border-top:none}
  .cbox{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;transition:.15s;background:var(--input)}
  .cbox.on{background:var(--cool);border-color:var(--cool)}
  .cbox svg{opacity:0;transform:scale(.5);transition:.15s}
  .cbox.on svg{opacity:1;transform:none}
  .checkrow .cx{flex:1}
  .checkrow .cx .n{font-size:14.5px}
  .checkrow .cx .d{font-size:11.5px;color:var(--dim)}

  .cardio-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
  .cardio-fields.two{grid-template-columns:1fr 1fr}
  .cf{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px}
  .cf label{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-family:var(--disp);display:block;margin-bottom:7px}
  .cf input{background:var(--input);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:11px 8px;font-size:19px;width:100%;text-align:center}
  .cf input:focus{outline:none;border-color:var(--cool)}

  textarea.note{width:100%;background:var(--input);border:1px solid var(--line);border-radius:11px;color:var(--text);
    font-family:var(--body);font-size:14px;padding:12px;margin-top:12px;resize:vertical;min-height:64px}
  textarea.note:focus{outline:none;border-color:var(--cool)}

  .actions{display:flex;gap:10px;margin:22px 0 8px;position:sticky;bottom:14px;z-index:5}
  .btn{flex:1;padding:15px;border-radius:13px;font-family:var(--disp);font-weight:500;font-size:15px;
    display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--warm);color:#1a0e04}
  .btn.primary.cool{background:var(--cool);color:#052420}

  .toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);opacity:0;pointer-events:none;
    background:var(--good);color:#04210f;font-family:var(--disp);font-weight:500;font-size:14px;
    padding:12px 20px;border-radius:11px;transition:.25s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  .hitem{background:var(--surface);border:1px solid var(--line);border-radius:var(--rs);padding:12px 14px;margin:10px 0}
  .hitem .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .hitem .date{font-family:var(--disp);font-size:13px;color:var(--text)}
  .hitem .del{font-size:11px;color:var(--faint);padding:4px 8px;border-radius:6px;border:1px solid var(--line-soft)}
  .hitem .del:active{color:var(--danger);border-color:var(--danger)}
  .hitem .line{font-size:12.5px;color:var(--dim);padding:2px 0}
  .hitem .line .k{color:var(--faint)}
  .empty{color:var(--faint);font-size:13px;text-align:center;padding:40px 20px}
  .foot{color:var(--faint);font-size:11px;text-align:center;margin-top:34px;line-height:1.6}
</style>
</head>
<body>

<div class="topbar">
  <button class="back" id="backBtn" aria-label="Zurück">‹</button>
  <div class="brand">
    <span class="t">TRAININGS<span class="accent">LOG</span></span>
    <span class="s" id="crumb">Nico</span>
  </div>
</div>

<div class="wrap">
  <div class="view active" id="home">
    <div class="phasebar" id="phasebar"></div>
    <div class="phasesub" id="phasesub"></div>
    <p class="lede">Wähle die Einheit, die du machst. Ziel-Werte stehen oben, danach trägst du deine echten Zahlen ein. Geteilte Einheiten behalten ihren Verlauf über die Phasen hinweg.</p>
    <div id="phaseContent"></div>
    <p class="foot">Werte werden im Browser gespeichert (localStorage). Nur auf diesem Gerät. Kein Konto, keine Cloud.</p>
  </div>
  <div class="view" id="session"></div>
</div>

<div class="toast" id="toast">Gespeichert ✓</div>

<script>
/* ============ ZONES (Karvonen: HFmax 207, Ruhe 46, HFR 161) ============ */
const Z = { z1:"127–143", z2:"145–159", z4:"180–190", z5:"191–207" };

/* ============ UNITS ============ */
const UNITS = {

      {id:"split", name:"Bulgarian Split Squat (Rucksack)", tag:"links zuerst", sets:3, reps:"10 / Seite", rpe:"7", rest:"75 s", mode:"unilateral"},
      {id:"pushup", name:"Liegestütze (Füsse erhöht)", sets:3, reps:"2 in Reserve", rpe:"8", rest:"90 s", mode:"reps"},
      {id:"pullup", name:"Klimmzüge / Band-Rudern", sets:3, reps:"max − 1", rpe:"8", rest:"2 Min", mode:"reps"},
      {id:"slrdl", name:"Single-Leg RDL (Rucksack)", tag:"links zuerst", sets:3, reps:"10 / Seite", rpe:"7", rest:"60 s", mode:"unilateral"},
      {id:"nordic", name:"Nordic / Band Leg Curl", sets:3, reps:"5", rpe:"exz.", rest:"90 s", mode:"reps"},

      {id:"calf", name:"Einbein-Wadenheben (Stufe)", sets:3, reps:"15 / Seite", rpe:"7", rest:"45 s", mode:"unilateral"}

  run:{ name:"Z2-Lauf", cat:"cardio", group:"Ausdauer & Speed", day:"Basislauf", dur:"25–40 Min", type:"cardio",
    desc:"Lockerer Grundlagenlauf. Phase 1–2.",

    fields:[{k:"distance",label:"Distanz km",im:"decimal"},{k:"duration",label:"Dauer Min",im:"numeric"},{k:"avgHR",label:"Ø HF bpm",im:"numeric"}]},
  bike:{ name:"Bike Z2", cat:"cardio", group:"Ausdauer & Speed", day:"Z2 · impactfrei", dur:"~40 Min", type:"cardio",

      {id:"calf", n:"Wadendehnung", d:"2×30 s / Seite — gastroc + soleus"},
      {id:"peanut", n:"BWS-Extension (Peanut/Roller)", d:"2×8–10 — steife Segmente"},

      {id:"acc", n:"4–6 kurze Beschleunigungen", d:"20–30 m, steigernd auf 90 %"},

      {id:"flush", n:"Bike / Schwimmen / Gehen", d:"15–20 Min locker (Z1)"},

/* ============ PHASES ============ */
const PHASES = {
  p1:{ name:"Phase 1", sub:"Saisonpause · 02.–12.07", units:["m1","kraftA","kraftB","s1","run","bike","intervals","pmr"] },
  p2:{ name:"Phase 2", sub:"Vorbereitung · 13.07–07.08 (inkl. Valencia)", units:["m1","kmaint","kbw","sp","run","bike","intervals","pma","pmr"] },
  p3:{ name:"Phase 3", sub:"Meisterschaft · ab 04.08", units:["m1","kmaint","bike","sp","topup","pma","pmr"] }
};
const GROUPS = ["Kraft","Ausdauer & Speed","Mobilität & Spieltag"];

/* ============ STORE ============ */
const KEY="nico_log_v1", PKEY="nico_phase_v1";
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{sessions:[]}}catch(e){return{sessions:[]}}}
function save(s){localStorage.setItem(KEY,JSON.stringify(s))}
function addSession(unit,data){const s=load();s.sessions.unshift({id:Date.now(),unit,date:todayISO(),data});save(s)}
function unitSessions(unit){return load().sessions.filter(x=>x.unit===unit)}
function lastSession(unit){return unitSessions(unit)[0]||null}
function todayISO(){return new Date().toISOString().slice(0,10)}
function fmtDate(iso){const d=new Date(iso+"T00:00");return d.toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'2-digit'})}
function loadPhase(){return localStorage.getItem(PKEY)||"p1"}
function savePhase(p){localStorage.setItem(PKEY,p)}

/* ============ NAV ============ */
const homeEl=document.getElementById('home'), sessEl=document.getElementById('session');
const backBtn=document.getElementById('backBtn'), crumb=document.getElementById('crumb');
let current=null, tab='log', phase=loadPhase();

backBtn.onclick=()=>goHome();
function goHome(){current=null;sessEl.classList.remove('active');homeEl.classList.add('active');
  backBtn.style.display='none';crumb.textContent='Nico';window.scrollTo(0,0)}
function openUnit(key){current=key;tab='log';homeEl.classList.remove('active');sessEl.classList.add('active');
  backBtn.style.display='flex';crumb.textContent=UNITS[key].name;renderSession();window.scrollTo(0,0)}

/* ============ HOME ============ */
function renderHome(){
  document.getElementById('phasebar').innerHTML=Object.keys(PHASES).map(p=>
    `<button class="pbtn ${p===phase?'on':''}" onclick="setPhase('${p}')">${PHASES[p].name}</button>`).join('');
  document.getElementById('phasesub').textContent=PHASES[phase].sub;
  const keys=PHASES[phase].units; let html='';
  GROUPS.forEach(g=>{
    const gk=keys.filter(k=>UNITS[k].group===g);
    if(!gk.length)return;
    html+=`<div class="section-label">${g}</div><div class="grid">${gk.map(unitCard).join('')}</div>`;
  });
  document.getElementById('phaseContent').innerHTML=html;
}
function setPhase(p){phase=p;savePhase(p);renderHome();window.scrollTo(0,0)}
function catClass(u){return u.cat==='cardio'?'card cool':'card'}
function unitCard(key){
  const u=UNITS[key], tag=u.md?`${u.day} · ${u.md}`:u.day;
  return `<button class="${catClass(u)}" onclick="openUnit('${key}')">
    <span class="tag">${tag}</span><h3>${u.name}</h3><div class="desc">${u.desc}</div><span class="chev">›</span></button>`;
}

/* ============ SESSION ============ */
function renderSession(){
  const u=UNITS[current];
  let html=`<div class="s-head"><h2>${u.name}</h2>
    <div class="s-sub">${u.day}${u.md?' · '+u.md:''} · ${u.dur}</div></div>
    <div class="tabs">
      <div class="tab ${tab==='log'?'on':''}" onclick="setTab('log')">Eintragen</div>
      <div class="tab ${tab==='hist'?'on':''}" onclick="setTab('hist')">Verlauf</div>
    </div>`;
  html+= tab==='hist' ? renderHistory() :
    (u.type==='strength'?renderStrength():
     u.type==='cardio'?renderCardio():
     u.type==='sp'?renderSP():
     u.type==='topup'?renderTopup():
     renderChecklist());
  sessEl.innerHTML=html;
  if(tab==='log') bindLog();
}
function setTab(t){tab=t;renderSession();window.scrollTo(0,0)}

/* ---- STRENGTH ---- */
function renderStrength(){
  const u=UNITS[current], last=lastSession(current); let h='';
  u.exercises.forEach(ex=>{
    const ld=last&&last.data[ex.id]?last.data[ex.id]:null;
    h+=`<div class="ex" data-ex="${ex.id}" data-mode="${ex.mode}">
      <div class="ex-top">
        <div class="ex-name">${ex.name}${ex.tag?` <span style="color:var(--faint);font-size:12px;font-weight:400">· ${ex.tag}</span>`:''}</div>
        ${progressBadge(ex,ld)}
      </div>
      <div class="ex-meta"><span class="m"><b>${ex.sets}×${ex.reps}</b></span>
        <span class="m">RPE <b>${ex.rpe}</b></span><span class="m">Pause <b>${ex.rest}</b></span></div>
      ${lastLine(ex,ld)}`;
    if(ex.mode==='check'){
      h+=`<div class="checkrow" style="border-top:none;padding-top:4px">
        <div class="cbox" data-check="${ex.id}" onclick="toggleCbox(this)">${tick()}</div>
        <div class="cx"><div class="n">Erledigt</div></div></div>`;
    }else{
      if(ex.mode==='barbell'){const bar=ld&&ld.bar!=null?ld.bar:20;
        h+=`<div class="barinfo">Stange: <input class="in" data-bar="1" inputmode="decimal" value="${bar}"> kg <span style="color:var(--faint)">(Scheiben pro Seite unten)</span></div>`;}
      for(let i=0;i<ex.sets;i++){const sd=ld&&ld.sets&&ld.sets[i]?ld.sets[i]:null;h+=setRow(ex,i,sd);}
    }
    h+=`</div>`;
  });
  return h+saveBar();
}
function setRow(ex,i,sd){
  const rpe=sd&&sd.rpe!=null?sd.rpe:'';
  if(ex.mode==='barbell'){const ps=sd&&sd.perSide!=null?sd.perSide:'';
    return `<div class="setrow"><span class="setno">S${i+1}</span><div class="fields">
      <div class="field"><label>kg / Seite</label><input class="in" data-f="perSide" inputmode="decimal" value="${ps}"></div>
      <div class="field"><label>RPE ist</label><input class="in rpe" data-f="rpe" inputmode="decimal" value="${rpe}"></div>
    </div><span class="total" data-total>—</span></div>`;}
  let fields='';
  if(ex.mode==='added'){const a=sd&&sd.added!=null?sd.added:'';
    fields=`<div class="field"><label>Zusatz kg</label><input class="in" data-f="added" inputmode="decimal" value="${a}"></div>
            <div class="field"><label>RPE ist</label><input class="in rpe" data-f="rpe" inputmode="decimal" value="${rpe}"></div>`;}
  else if(ex.mode==='unilateral'){const l=sd&&sd.left!=null?sd.left:'', r=sd&&sd.right!=null?sd.right:'';
    fields=`<div class="field"><label>Links kg</label><input class="in" data-f="left" inputmode="decimal" value="${l}"></div>
            <div class="field"><label>Rechts kg</label><input class="in" data-f="right" inputmode="decimal" value="${r}"></div>
            <div class="field"><label>RPE</label><input class="in rpe" data-f="rpe" inputmode="decimal" value="${rpe}"></div>`;}
  else if(ex.mode==='reps'){const rp=sd&&sd.repsDone!=null?sd.repsDone:'';
    fields=`<div class="field"><label>Wdh</label><input class="in" data-f="repsDone" inputmode="numeric" value="${rp}"></div>
            <div class="field"><label>RPE</label><input class="in rpe" data-f="rpe" inputmode="decimal" value="${rpe}"></div>`;}
  else if(ex.mode==='simple'){const w=sd&&sd.weight!=null?sd.weight:'';
    fields=`<div class="field"><label>Gewicht kg</label><input class="in" data-f="weight" inputmode="decimal" value="${w}"></div>
            <div class="field"><label>RPE</label><input class="in rpe" data-f="rpe" inputmode="decimal" value="${rpe}"></div>`;}
  return `<div class="setrow"><span class="setno">S${i+1}</span><div class="fields">${fields}</div></div>`;
}
function lastLine(ex,ld){
  if(!ld) return `<div class="last"><span class="lbl">Erste Einheit — noch keine Referenz</span></div>`;
  let s='';
  if(ex.mode==='check'){s=ld.done?'erledigt':'—';}
  else if(ld.sets){s=ld.sets.filter(Boolean).map(st=>setSummary(ex,st,ld.bar)).filter(Boolean).join('  ·  ');}
  return `<div class="last"><span class="lbl">Letztes Mal:</span> <span class="num" style="color:var(--dim)">${s||'—'}</span></div>`;
}
function setSummary(ex,st,bar){
  if(ex.mode==='barbell'){if(st.perSide==null||st.perSide==='')return'';return `${num(st.perSide)*2+num(bar)}kg${st.rpe?` @${st.rpe}`:''}`;}
  if(ex.mode==='added'){if(st.added==null||st.added==='')return'';return `+${st.added}kg${st.rpe?` @${st.rpe}`:''}`;}
  if(ex.mode==='unilateral'){if((st.left==null||st.left==='')&&(st.right==null||st.right===''))return'';return `${st.left||0}/${st.right||0}kg${st.rpe?` @${st.rpe}`:''}`;}
  if(ex.mode==='reps'){if(st.repsDone==null||st.repsDone==='')return'';return `${st.repsDone}Wdh${st.rpe?` @${st.rpe}`:''}`;}
  if(ex.mode==='simple'){if(st.weight==null||st.weight==='')return'';return `${st.weight}kg${st.rpe?` @${st.rpe}`:''}`;}
  return'';
}
function progressBadge(ex,ld){
  if(!ld||!ld.sets)return'';
  let bestRpe=null,bestLoad=-1;
  ld.sets.filter(Boolean).forEach(st=>{
    let load=-1,rpe=st.rpe!=null&&st.rpe!==''?num(st.rpe):null;
    if(ex.mode==='barbell')load=num(st.perSide)*2+num(ld.bar);
    else if(ex.mode==='added')load=num(st.added);
    else if(ex.mode==='unilateral')load=Math.min(num(st.left),num(st.right));
    else if(ex.mode==='simple')load=num(st.weight);
    else if(ex.mode==='reps')load=num(st.repsDone);
    if(load>=bestLoad&&rpe!=null){bestLoad=load;bestRpe=rpe;}
  });
  if(bestRpe!=null&&bestRpe<=7){return `<span class="ex-hint-inline">↑ ${ex.mode==='reps'?'+1 Wdh':'+2.5 kg'} probieren</span>`;}
  return'';
}

/* ---- CARDIO (bike / run / intervals) ---- */
function renderCardio(){
  const u=UNITS[current], last=lastSession(current), l=last?last.data:{};
  const tgt=u.target.map(t=>`<span class="pill">${t[0]} <b>${t[1]}</b></span>`).join('');
  const lastTxt=last?`<div class="last" style="margin:12px 2px 0"><span class="lbl">Letztes Mal:</span> <span class="num" style="color:var(--dim)">${cardioSummary(l)}</span></div>`:'';
  const cls=u.fields.length===2?'cardio-fields two':'cardio-fields';
  const flds=u.fields.map(f=>`<div class="cf"><label>${f.label}</label><input id="c_${f.k}" inputmode="${f.im}" value="${l[f.k]||''}"></div>`).join('');
  return `<div class="s-target">${tgt}</div>${lastTxt}
    <div class="${cls}">${flds}</div>
    <textarea class="note" id="c_note" placeholder="Notiz (optional)">${l.note||''}</textarea>${saveBar()}`;
}
function cardioSummary(d){
  if(d.level!=null&&d.level!=='') return `Level ${d.level||'–'} · ${d.duration||'–'} Min · Ø ${d.avgHR||'–'} bpm`;
  if(d.distance!=null&&d.distance!=='') return `${d.distance||'–'} km · ${d.duration||'–'} Min · Ø ${d.avgHR||'–'} bpm`;
  return `${d.duration||'–'} Min · Ø ${d.avgHR||'–'} bpm`;
}

/* ---- SP / S1 ---- */
function renderSP(){
  const u=UNITS[current], last=lastSession(current), l=last?last.data:{};
  const steps=u.steps.map(s=>`<div class="checkrow"><div class="cbox" data-check="${hashId(s)}" onclick="toggleCbox(this)">${tick()}</div><div class="cx"><div class="n">${s}</div></div></div>`).join('');
  const lastTxt=last&&l.broad?`<div class="last" style="margin:10px 2px"><span class="lbl">Letzter Broad Jump:</span> <span class="num" style="color:var(--dim)">${l.broad} cm</span></div>`:'';
  return `<div class="ex" style="padding-bottom:12px">${steps}</div>${lastTxt}
    <div class="cardio-fields two">
      <div class="cf"><label>Broad Jump cm (opt.)</label><input id="sp_broad" inputmode="numeric" value="${l.broad||''}"></div>
      <div class="cf"><label>Ø HF (opt.)</label><input id="sp_hr" inputmode="numeric" value="${l.hr||''}"></div>
    </div>
    <textarea class="note" id="sp_note" placeholder="Notiz (optional)">${l.note||''}</textarea>${saveBar()}`;
}
/* ---- TOPUP ---- */
function renderTopup(){
  const u=UNITS[current], last=lastSession(current), l=last?last.data:{};
  const steps=u.steps.map(s=>`<div class="checkrow"><div class="cbox" data-check="${hashId(s)}" onclick="toggleCbox(this)">${tick()}</div><div class="cx"><div class="n">${s}</div></div></div>`).join('');
  return `<div class="ex" style="padding-bottom:12px">${steps}</div>
    <div class="cardio-fields two">
      <div class="cf"><label>Ø HF (opt.)</label><input id="tu_hr" inputmode="numeric" value="${l.hr||''}"></div>
      <div class="cf"><label>Sprints Anzahl</label><input id="tu_sprints" inputmode="numeric" value="${l.sprints||''}"></div>
    </div>
    <textarea class="note" id="tu_note" placeholder="Notiz (optional)">${l.note||''}</textarea>${saveBar()}`;
}
/* ---- CHECKLIST ---- */
function renderChecklist(){
  const u=UNITS[current];
  const rows=u.items.map(it=>`<div class="checkrow">
      <div class="cbox" data-check="${it.id}" onclick="toggleCbox(this)">${tick()}</div>
      <div class="cx"><div class="n">${it.n}</div>${it.d?`<div class="d">${it.d}</div>`:''}</div></div>`).join('');
  const ohs=u.ohs?`<textarea class="note" id="ohs_note" placeholder="OHS-Notiz: Ferse am Boden? Oberkörper aufrecht? Besser als letztes Mal?"></textarea>`:'';
  return `<div class="ex" style="padding:6px 15px">${rows}</div>${ohs}
    <div class="actions"><button class="btn primary ${u.cat==='cardio'?'cool':''}" onclick="checkAllAndSave()">Alle abhaken &amp; speichern</button></div>`;
}

/* ============ SHARED ============ */
function tick(){return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#04210f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'}
function saveBar(){const cool=UNITS[current].cat==='cardio'?'cool':'';
  return `<div class="actions"><button class="btn primary ${cool}" onclick="doSave()">Session speichern</button></div>`;}
function toggleCbox(el){el.classList.toggle('on')}

function bindLog(){
  sessEl.querySelectorAll('.ex[data-mode="barbell"]').forEach(ex=>{
    const bar=ex.querySelector('[data-bar]');
    const upd=()=>ex.querySelectorAll('.setrow').forEach(row=>{
      const ps=row.querySelector('[data-f="perSide"]'), tot=row.querySelector('[data-total]');
      if(!ps||!tot)return; tot.textContent = ps.value!==''?(num(ps.value)*2+num(bar.value))+'kg':'—';
    });
    ex.addEventListener('input',upd); upd();
  });
}

/* ============ SAVE ============ */
function doSave(){
  const u=UNITS[current];
  if(u.type==='strength') saveStrength();
  else if(u.type==='cardio') saveCardio();
  else if(u.type==='sp') saveSteps({broad:'sp_broad',hr:'sp_hr',note:'sp_note'});
  else if(u.type==='topup') saveSteps({hr:'tu_hr',sprints:'tu_sprints',note:'tu_note'});
  else saveChecklist();
}
function saveStrength(){
  const u=UNITS[current], data={};
  u.exercises.forEach(ex=>{
    const exEl=sessEl.querySelector(`.ex[data-ex="${ex.id}"]`);
    if(ex.mode==='check'){data[ex.id]={done:exEl.querySelector('[data-check]').classList.contains('on')};return;}
    const rec={mode:ex.mode,sets:[]};
    if(ex.mode==='barbell'){const b=exEl.querySelector('[data-bar]');rec.bar=b?num(b.value):20;}
    exEl.querySelectorAll('.setrow').forEach(row=>{
      const st={};let any=false;
      row.querySelectorAll('input[data-f]').forEach(inp=>{const f=inp.getAttribute('data-f');const v=inp.value.trim();st[f]=v===''?null:v;if(v!=='')any=true;});
      rec.sets.push(any?st:null);
    });
    data[ex.id]=rec;
  });
  addSession(current,data);toast('Krafteinheit gespeichert ✓');goHome();
}
function saveCardio(){
  const u=UNITS[current], data={};
  u.fields.forEach(f=>{const el=document.getElementById('c_'+f.k);data[f.k]=el?el.value.trim():'';});
  const n=document.getElementById('c_note');data.note=n?n.value.trim():'';
  addSession(current,data);toast('Gespeichert ✓');goHome();
}
function saveSteps(map){
  const data={};for(const k in map){const el=document.getElementById(map[k]);data[k]=el?el.value.trim():'';}
  const checks={};sessEl.querySelectorAll('[data-check]').forEach(c=>checks[c.getAttribute('data-check')]=c.classList.contains('on'));
  data.checks=checks;addSession(current,data);toast('Gespeichert ✓');goHome();
}
function saveChecklist(){
  const data={checks:{}};
  sessEl.querySelectorAll('[data-check]').forEach(c=>data.checks[c.getAttribute('data-check')]=c.classList.contains('on'));
  const ohs=document.getElementById('ohs_note');if(ohs)data.ohs=ohs.value.trim();
  addSession(current,data);toast('Gespeichert ✓');goHome();
}
function checkAllAndSave(){sessEl.querySelectorAll('[data-check]').forEach(c=>c.classList.add('on'));saveChecklist();}

/* ============ HISTORY ============ */
function renderHistory(){
  const u=UNITS[current], list=unitSessions(current).slice(0,5);
  if(!list.length) return `<div class="empty">Noch keine Einträge.<br>Trag deine erste Einheit ein.</div>`;
  return list.map(s=>`<div class="hitem">
      <div class="hd"><span class="date">${fmtDate(s.date)}</span>
        <button class="del" onclick="delSession(${s.id})">löschen</button></div>
      ${historyLines(u,s.data)}</div>`).join('');
}
function historyLines(u,d){
  if(u.type==='strength'){
    return u.exercises.map(ex=>{
      const ld=d[ex.id];if(!ld)return'';
      if(ex.mode==='check')return `<div class="line"><span class="k">${ex.name}:</span> ${ld.done?'erledigt':'—'}</div>`;
      if(!ld.sets)return'';
      const parts=ld.sets.filter(Boolean).map(st=>setSummary(ex,st,ld.bar)).filter(Boolean);
      if(!parts.length)return'';
      return `<div class="line"><span class="k">${ex.name}:</span> <span class="num">${parts.join(' · ')}</span></div>`;
    }).filter(Boolean).join('')||`<div class="line">—</div>`;
  }
  if(u.type==='cardio')return `<div class="line"><span class="num">${cardioSummary(d)}</span></div>${d.note?`<div class="line">${d.note}</div>`:''}`;
  if(u.type==='sp')return `<div class="line"><span class="num">Broad Jump ${d.broad||'–'} cm${d.hr?` · Ø ${d.hr} bpm`:''}</span></div>${d.note?`<div class="line">${d.note}</div>`:''}`;
  if(u.type==='topup')return `<div class="line"><span class="num">${d.hr?`Ø ${d.hr} bpm`:'erledigt'}${d.sprints?` · ${d.sprints} Sprints`:''}</span></div>${d.note?`<div class="line">${d.note}</div>`:''}`;
  const done=Object.values(d.checks||{}).filter(Boolean).length, tot=Object.keys(d.checks||{}).length;
  return `<div class="line"><span class="num">${done}/${tot} abgehakt</span></div>${d.ohs?`<div class="line"><span class="k">OHS:</span> ${d.ohs}</div>`:''}`;
}
function delSession(id){if(!confirm('Diese Einheit löschen?'))return;const s=load();s.sessions=s.sessions.filter(x=>x.id!==id);save(s);renderSession();}

/* ============ UTIL ============ */
function num(v){const n=parseFloat(v);return isNaN(n)?0:n}
function hashId(str){let h=0;for(let i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))>>>0;return 'k'+h}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800)}

/* ============ INIT ============ */
renderHome();
</script>
</body>
</html>
